<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cross-Origin-Opener-Policy" content="same-origin">
    <meta http-equiv="Cross-Origin-Embedder-Policy" content="require-corp">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuatOS Web Simulator</title>
    <style>
        body { margin: 0; background: #111827; color: #e5e7eb; font-family: sans-serif; }
        #shell { display: grid; grid-template-columns: 1fr 320px; height: 100vh; }
        #app { display: flex; flex-direction: column; }
        canvas { flex: 1; background: #000; width: 100%; height: 100%; }
        #panel { border-left: 1px solid #374151; padding: 12px; overflow: auto; }
        #status { color: #93c5fd; margin-bottom: 12px; }
        #log { white-space: pre-wrap; font-size: 12px; line-height: 1.4; }
        .hint { color: #9ca3af; font-size: 12px; }
    </style>
</head>
<body>
<div id="shell">
    <div id="app">
        <canvas id="canvas" width="960" height="540"></canvas>
    </div>
    <aside id="panel">
        <div id="status">Booting...</div>
        <div class="hint">Browser shell for the LuatOS wasm build.</div>
        <pre id="log"></pre>
    </aside>
</div>
<script>
    const statusEl = document.getElementById('status');
    const logEl = document.getElementById('log');
    const pushLog = (line) => {
        logEl.textContent += line + "\n";
        logEl.scrollTop = logEl.scrollHeight;
    };
    window.Module = {
        canvas: document.getElementById('canvas'),
        print: (text) => pushLog(text),
        printErr: (text) => pushLog("[err] " + text),
        setStatus: (text) => { statusEl.textContent = text; pushLog("[status] " + text); },
        onRuntimeInitialized: () => {
            statusEl.textContent = "Runtime initialized";
        }
    };
</script>
<script src="luatos-web.js"></script>
</body>
</html>
